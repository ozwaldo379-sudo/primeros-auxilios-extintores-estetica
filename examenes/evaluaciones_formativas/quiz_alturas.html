<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 Quiz Formativo — Trabajo en Alturas | Vértice EHS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--dark:#080f1a;--navy:#0d1f35;--green:#2E8B57;--green-light:#3aaf6d;--gold:#C9A961;--gold-light:#dfc07a;--gold-dim:rgba(201,169,97,.12);--red:#e05252;--white:#fff;--off-white:#f0f4f8;--muted:#8fa3bc;--border:rgba(255,255,255,.09)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--dark);color:var(--white);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px}
.quiz-wrap{width:100%;max-width:720px}
.quiz-header{text-align:center;margin-bottom:40px}
.quiz-header .kicker{font-family:'Barlow Condensed';font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--green-light);margin-bottom:8px}
.quiz-header h1{font-family:'Playfair Display';font-size:42px;color:var(--white);margin-bottom:8px}
.quiz-header p{color:var(--muted);font-size:16px}
.module-selector{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:32px}
.mod-btn{font-family:'Barlow Condensed';font-size:13px;font-weight:800;letter-spacing:1px;padding:8px 18px;border-radius:999px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;transition:all .2s}
.mod-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light)}
.q-card{background:linear-gradient(160deg,rgba(27,54,93,.65),rgba(13,31,53,.65));border:1px solid var(--border);border-radius:16px;padding:36px;margin-bottom:20px;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-family:'Barlow Condensed';font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.q-text{font-size:20px;color:var(--off-white);font-weight:500;line-height:1.5;margin-bottom:20px}
.opts{display:grid;gap:10px}
.opt{display:flex;align-items:center;gap:12px;padding:14px 18px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .22s;background:rgba(255,255,255,.02)}
.opt:hover:not(.locked){border-color:var(--gold);background:var(--gold-dim)}
.opt.correct{border-color:var(--green-light);background:rgba(46,139,87,.12);pointer-events:none}
.opt.wrong{border-color:var(--red);background:rgba(224,82,82,.1);pointer-events:none}
.opt.neutral{opacity:.45;pointer-events:none}
.opt-l{font-family:'Barlow Condensed';font-size:18px;font-weight:800;color:var(--gold-light);min-width:24px}
.opt-t{font-size:16px;color:var(--off-white)}
.fb{display:none;margin-top:14px;padding:14px 18px;border-radius:8px;font-size:14px;line-height:1.5}
.fb.show{display:block}
.fb.ok{background:rgba(46,139,87,.12);border:1px solid rgba(46,139,87,.3);color:#7de8a8}
.fb.ko{background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.3);color:#ffaaaa}
.score-bar{background:rgba(255,255,255,.06);height:6px;border-radius:3px;margin-bottom:32px}
.score-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .4s}
.result-box{text-align:center;background:linear-gradient(160deg,rgba(27,54,93,.7),rgba(13,31,53,.7));border:1px solid var(--border);border-radius:16px;padding:48px;display:none}
.result-box.show{display:block;animation:fadeUp .5s ease}
.result-score{font-family:'Playfair Display';font-size:72px;font-weight:900;color:var(--gold-light);margin:16px 0}
.result-msg{font-size:18px;color:var(--muted);margin-bottom:32px}
.btn-retry{font-family:'Barlow Condensed';font-size:20px;font-weight:800;letter-spacing:1px;padding:14px 40px;background:linear-gradient(90deg,var(--green),var(--gold));color:#fff;border:none;border-radius:999px;cursor:pointer;box-shadow:0 8px 24px rgba(46,139,87,.3)}
.btn-retry:hover{transform:translateY(-2px)}
.locked{pointer-events:none}
</style>
</head>
<body>

<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="kicker">Evaluación Formativa</div>
    <h1>Quiz por Módulo</h1>
    <p>Selecciona el módulo a evaluar · 5 preguntas · Sin límite de tiempo</p>
  </div>

  <div class="module-selector">
    <button class="mod-btn active" onclick="loadModule('A1')">Módulo A1 — Normativa</button>
    <button class="mod-btn" onclick="loadModule('A2')">Módulo A2 — Análisis Riesgo</button>
    <button class="mod-btn" onclick="loadModule('A3')">Módulo A3 — EPP & SPPC</button>
    <button class="mod-btn" onclick="loadModule('A4')">Módulo A4 — PTS</button>
    <button class="mod-btn" onclick="loadModule('A5')">Módulo A5 — Rescate</button>
  </div>

  <div class="score-bar"><div class="score-fill" id="scoreFill" style="width:0%"></div></div>
  <div id="questionsWrap"></div>
  <div class="result-box" id="resultBox">
    <div style="font-size:48px">🏆</div>
    <div class="result-score" id="resultScore">0/5</div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="btn-retry" onclick="retryModule()">🔄 Repetir Quiz</button>
  </div>
</div>

<script>
const MODULES = {
  A1:[
    {q:'¿A qué altura aplica la NOM-009-STPS-2011?',opts:['1.0 metro','1.5 metros','1.8 metros','2.0 metros'],a:2,fb:'La NOM-009 aplica cuando el trabajo se realiza a 1.8 metros o más sobre el nivel de referencia, donde exista riesgo de caída.'},
    {q:'¿Cuál de los siguientes es un requisito legal del PATRÓN según el Numeral 5 de la NOM-009?',opts:['Proporcionar EPP a costo del trabajador','Elaborar análisis de riesgo por cada tipo de trabajo en altura','Solo capacitar al supervisor, no al trabajador','Actualizar el PTS cada 5 años'],a:1,fb:'El patrón debe elaborar un Análisis de Riesgo específico para cada tipo de trabajo en altura como uno de sus 8 requisitos mínimos del Numeral 5.'},
    {q:'¿Qué derecho fundamental establece el Artículo 512-B de la LFT para el trabajador?',opts:['Cobrar horas extras por trabajo en altura','Negarse a realizar trabajos en condiciones de riesgo inminente sin represalia','Elegir el tipo de EPP que prefiera','Ausentarse sin justificación en jornadas de altura'],a:1,fb:'El Art. 512-B de la LFT protege al trabajador que se niega a trabajar cuando existe riesgo grave inminente para su vida o integridad física.'},
    {q:'Un trabajo de pintura se realiza en una escalera a 1.5 metros de altura. ¿La NOM-009-STPS-2011 aplica?',opts:['Sí, porque implica trabajo en altura','No, porque está por debajo del umbral de 1.8m de la NOM-009','Sí, siempre que haya riesgo de caída','No, las escaleras tienen su propia norma'],a:1,fb:'La NOM-009 aplica específicamente para alturas de 1.8 metros o más. Sin embargo, a 1.5m aún deben aplicarse medidas preventivas generales de seguridad.'},
    {q:'¿Con qué frecuencia mínima debe actualizarse el Plan de Trabajo Seguro (PTS) según buenas prácticas?',opts:['Cada 5 años','Solo cuando ocurre un accidente','Antes de cada trabajo, verificando que las condiciones no hayan cambiado','Una vez al año'],a:2,fb:'El PTS debe revisarse y verificarse antes de CADA trabajo, ya que las condiciones (clima, personas, equipo, área) pueden cambiar. Un PTS genérico que no considera el día específico no es válido.'}
  ],
  A2:[
    {q:'¿Cuál es la fórmula básica para calcular el Nivel de Riesgo en una matriz PxS?',opts:['Riesgo = Probabilidad + Severidad','Riesgo = Probabilidad × Severidad','Riesgo = Frecuencia − Controles','Riesgo = Exposición × Consecuencia'],a:1,fb:'Riesgo = Probabilidad × Severidad (PxS). Resultado 1-2: Bajo; 3-4: Medio; 6-9: Alto. Es la fórmula base de la mayoría de matrices de riesgo en SST.'},
    {q:'Identificas que un trabajador debe subir a una cubierta de 3 metros que no tiene barandal. ¿Cuál es la primera pregunta del Análisis de Riesgo?',opts:['¿Qué EPP tiene el trabajador?','¿Puede el trabajo realizarse sin subir a esa cubierta? (Eliminación)','¿Cuántas horas tardará?','¿El trabajador tiene experiencia?'],a:1,fb:'El AR siempre inicia con el primer nivel de la jerarquía: ¿Se puede eliminar el riesgo? ¿Puede hacerse desde tierra con herramienta telescópica o drone? Solo si la eliminación no es viable se desciende en la jerarquía.'},
    {q:'¿Cuál es el peligro MÁS frecuente en trabajos en altura?',opts:['Estrés térmico','Caída de objetos','Caída libre del trabajador','Contacto eléctrico'],a:2,fb:'La caída libre del trabajador es el peligro más frecuente y el de mayor potencial de fatalidad en trabajos en altura. Sin embargo, todos los peligros deben identificarse en el AR.'},
    {q:'Al evaluar un trabajo en altura bajo la lluvia, ¿cómo cambia el nivel de riesgo?',opts:['No cambia si el arnés está bien puesto','La Probabilidad de caída aumenta, incrementando el nivel de riesgo','Solo cambia si la lluvia es muy intensa','No se trabaja bajo lluvia, así que el AR no aplica'],a:1,fb:'La lluvia incrementa la probabilidad de resbalón (superficies húmedas), reduce la visibilidad y puede interferir con el EPP eléctrico. La Probabilidad en la matriz PxS aumenta, elevando el nivel de riesgo. En muchos casos, el trabajo debe suspenderse.'},
    {q:'¿Qué información MÍNIMA debe documentarse en el AR para trabajo en altura?',opts:['Solo el nombre del trabajador y fecha','Tarea, peligros, nivel de riesgo, controles aplicados y firma de autorización','El tiempo estimado del trabajo','El costo del EPP utilizado'],a:1,fb:'El AR mínimo documenta: descripción de la tarea, peligros identificados, evaluación del riesgo (PxS), controles a aplicar (jerarquía), y firma de quien elaboró y autorizó.'}
  ],
  A3:[
    {q:'¿Qué clase de arnés exige la NOM-009 para trabajos con riesgo de caída libre?',opts:['Clase 1 — soporte de cintura','Clase 2 — medio cuerpo','Clase 3 — cuerpo completo','Cualquier clase certificada por el fabricante'],a:2,fb:'La NOM-009 exige arnés Clase 3 (cuerpo completo) para trabajos con riesgo de caída libre. El arnés clase 3 distribuye las fuerzas de impacto en muslos, glúteos, pecho y hombros, reduciendo lesiones internas.'},
    {q:'¿Cuál es la capacidad mínima que debe tener un punto de anclaje para SPPC?',opts:['500 kg','1,000 kg','2,000 kg (o 22 kN según ANSI)','El peso del trabajador × 2'],a:2,fb:'Los puntos de anclaje para SPPC deben soportar mínimo 2,000 kg (19.6 kN) o 22 kN según ANSI Z359. Esto garantiza que absorban las fuerzas de detención de una caída libre.'},
    {q:'Un arnés tiene una fecha de fabricación de enero 2014. Visualmente está en perfecto estado. ¿Qué decides?',opts:['Aprobarlo porque visualmente está bien','Rechazarlo: supera los 10 años de vida útil recomendados por fabricantes','Aprobarlo para trabajos de poca altura','Someterlo a prueba de carga antes de usar'],a:1,fb:'La mayoría de fabricantes certificados recomiendan retirar arneses después de 10 años desde su fecha de fabricación, independientemente del estado visual. El polímero de las correas se degrada con UV y tiempo incluso sin uso visible.'},
    {q:'¿Qué significa que el absorbedor de impacto de una línea de vida esté "desplegado"?',opts:['Que el equipo está nuevo y listo para usar','Que el equipo absorbió una caída y debe retirarse definitivamente','Que necesita mantenimiento y puede seguir usándose','Que el fabricante lo diseñó así para mayor comodidad'],a:1,fb:'El absorbedor de impacto está diseñado para desgarrarse de forma controlada al recibir la carga de una caída, absorbiendo la energía. Una vez desplegado (desgarrado) ha cumplido su función y NUNCA puede reutilizarse.'},
    {q:'¿Cuál es la diferencia entre el sistema de RESTRICCIÓN y el sistema de DETENCIÓN DE CAÍDA?',opts:['Son sinónimos, se usan indistintamente','Restricción: impide que el trabajador llegue al borde. Detención: detiene la caída después de que ocurre','Detención es más efectiva que restricción en todos los casos','Restricción se usa en andamios; detención en escaleras'],a:1,fb:'Sistema de RESTRICCIÓN: limita el movimiento del trabajador para que NO llegue a la zona de caída (no hay caída). Sistema de DETENCIÓN: permite que el trabajador llegue al borde y DETIENE la caída después de que inicia. La restricción es preferible cuando es viable.'}
  ],
  A4:[
    {q:'¿Cuál es el propósito principal del Permiso de Trabajo para actividades en altura?',opts:['Documentar quién subió para responsabilidad legal','Verificar que se han analizado y controlado todos los riesgos antes del inicio, y que existe autorización formal','Registrar el tiempo de trabajo para nómina','Cumplir un trámite administrativo de la empresa'],a:1,fb:'El Permiso de Trabajo es una herramienta preventiva: garantiza que los riesgos han sido identificados y controlados, que el personal está capacitado y equipado, y que existe una autorización formal antes de iniciar el trabajo de alto riesgo.'},
    {q:'El jefe de producción pide iniciar el trabajo en altura "solo 20 minutos" sin esperar el permiso. ¿Cuál es la respuesta correcta?',opts:['Aceptar si el supervisor está presente','Rechazar: ningún trabajo en altura debe iniciarse sin permiso vigente, independientemente del tiempo estimado','Aceptar si el trabajador tiene EPP','Consultarlo con el gerente antes de decidir'],a:1,fb:'El tiempo estimado del trabajo no es un criterio para omitir el permiso de trabajo. La mayoría de los accidentes fatales ocurren en trabajos "rápidos" realizados sin los controles necesarios. El permiso SIEMPRE es obligatorio.'},
    {q:'¿Qué información es OBLIGATORIA en un Permiso de Trabajo de altura?',opts:['Solo la firma del trabajador y del supervisor','Descripción de la tarea, peligros identificados, controles, EPP, plan de rescate, vigencia y firmas de autorización','El costo de los materiales del trabajo','La fecha de vencimiento de la certificación del trabajador'],a:1,fb:'Un Permiso de Trabajo de altura válido incluye mínimamente: qué se hará, dónde, peligros y controles, EPP requerido, plan de emergencia, personas autorizadas, hora de inicio y fin, y firmas de quien elabora, ejecuta y autoriza.'},
    {q:'¿En qué situación se SUSPENDE un trabajo en altura y se cancela el permiso?',opts:['Cuando el trabajador tiene hambre','Cuando cambian las condiciones que generaron el AR original (lluvia, nuevo riesgo, cambio de personal)','Cuando el supervisor va a comer','Solo si ocurre un accidente'],a:1,fb:'El Permiso de Trabajo se cancela cuando las condiciones del AR ya no son válidas: cambio climático, nuevo peligro, cambio de personal no capacitado, incidente en el área, o solicitud del trabajador por riesgo percibido.'},
    {q:'¿Quién tiene autoridad para AUTORIZAR un permiso de trabajo de alto riesgo?',opts:['El trabajador que realizará el trabajo','El jefe de turno de producción','El responsable de SST o supervisor designado y capacitado para alto riesgo','Cualquier empleado de la empresa'],a:2,fb:'El Permiso de Trabajo debe ser autorizado por el responsable de SST o la persona designada y específicamente capacitada para autorizar trabajos de alto riesgo. La autoridad del permiso no puede delegarse a personal no capacitado.'}
  ],
  A5:[
    {q:'¿Cuánto tiempo máximo puede permanecer un trabajador suspendido en arnés antes del riesgo fatal?',opts:['5 minutos','15 minutos','30 minutos','1 hora'],a:1,fb:'El Síndrome de Suspensión en Arnés puede ser fatal en tan solo 15 minutos. El plan de rescate debe garantizar recuperar al trabajador en este tiempo o menos.'},
    {q:'¿Cuál es la posición CORRECTA para recibir a un trabajador rescatado de una suspensión en arnés?',opts:['Sentado con piernas colgando','Acostado con las piernas ligeramente elevadas (no más de 30°) durante los primeros 30 minutos','De pie para facilitar la circulación','Boca abajo para liberar la presión del tórax'],a:1,fb:'La posición correcta post-rescate de suspensión es: acostado, piernas ligeramente elevadas (NO más de 30°), durante 30 minutos mínimo. Poner al trabajador vertical inmediatamente puede causar muerte súbita por síndrome ortostático.'},
    {q:'¿Cuál es el PRIMER paso del protocolo de rescate cuando un trabajador queda suspendido en altura?',opts:['Subir inmediatamente a rescatar al trabajador','Notificar al equipo de emergencias y evaluar el estado del trabajador verbalmente desde tierra','Esperar a que baje solo','Cortar la línea de vida para que caiga de manera controlada'],a:1,fb:'El primer paso SIEMPRE es notificar a emergencias y evaluar al trabajador verbalmente desde tierra. Un rescatista que sube sin EPP puede convertirse en segunda víctima. La comunicación verbal también permite evaluar el estado del trabajador.'},
    {q:'¿Cuál de los siguientes síntomas indica el inicio del Síndrome de Suspensión en Arnés?',opts:['Fiebre alta y escalofríos','Mareo, náuseas, palidez, hormigueo o adormecimiento en piernas','Tos persistente y dificultad para hablar','Solo dolor de espalda'],a:1,fb:'Los síntomas del síndrome de suspensión incluyen: mareo, náuseas, palidez, sudoración fría, hormigueo o pérdida de sensación en piernas, y progresivamente pérdida de consciencia. Son causados por el bloqueo del retorno venoso en las piernas por las correas del arnés.'},
    {q:'¿Por qué NO se puede subir directamente a rescatar a un trabajador sin equiparse primero?',opts:['Porque las normas lo prohíben expresamente','Porque un rescatista sin EPP puede caer y convertirse en segunda víctima, agravando la emergencia','Porque el permiso de trabajo debe actualizarse primero','No existe tal restricción, la urgencia justifica subir sin EPP'],a:1,fb:'La regla de oro del rescate: NUNCA crear una segunda víctima. Un rescatista sin EPP en una emergencia de altura puede caer accidentalmente, duplicando la emergencia. Siempre: equipar al rescatista primero, luego ejecutar el rescate.'}
  ]
};

let currentMod = 'A1';
let answered = [];
let score = 0;

function loadModule(mod) {
  currentMod = mod;
  answered = [];
  score = 0;
  document.querySelectorAll('.mod-btn').forEach(b => {
    b.classList.remove('active');
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes(`'${mod}'`)) {
      b.classList.add('active');
    }
  });
  document.getElementById('resultBox').className = 'result-box';
  document.getElementById('scoreFill').style.width = '0%';
  renderQuestions();
}

function renderQuestions() {
  const qs = MODULES[currentMod];
  const wrap = document.getElementById('questionsWrap');
  wrap.innerHTML = '';
  qs.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-card';
    const letters = ['A','B','C','D'];
    div.innerHTML = `<div class="q-num">Pregunta ${i+1} de ${qs.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="opts" id="opts-${i}">
        ${q.opts.map((o,oi)=>`<div class="opt" id="opt-${i}-${oi}" onclick="answer(${i},${oi})">
          <div class="opt-l">${letters[oi]}</div><div class="opt-t">${o}</div></div>`).join('')}
      </div>
      <div class="fb" id="fb-${i}"></div>`;
    wrap.appendChild(div);
  });
}

function answer(qIdx, optIdx) {
  if (answered.includes(qIdx)) return;
  answered.push(qIdx);
  const q = MODULES[currentMod][qIdx];
  document.querySelectorAll(`#opts-${qIdx} .opt`).forEach((el,i)=>{
    if(i===q.a) el.classList.add('correct');
    else if(i===optIdx && optIdx!==q.a) el.classList.add('wrong');
    else el.classList.add('neutral');
  });
  if (optIdx===q.a) score++;
  const fb = document.getElementById(`fb-${qIdx}`);
  fb.className = `fb show ${optIdx===q.a?'ok':'ko'}`;
  fb.innerHTML = `${optIdx===q.a?'✅':'❌'} ${q.fb}`;
  document.getElementById('scoreFill').style.width = (answered.length/MODULES[currentMod].length*100)+'%';
  if (answered.length === MODULES[currentMod].length) setTimeout(showResult, 600);
}

function showResult() {
  const total = MODULES[currentMod].length;
  const pct = Math.round(score/total*100);
  const rb = document.getElementById('resultBox');
  rb.className = 'result-box show';
  document.getElementById('resultScore').textContent = `${score}/${total}`;
  document.getElementById('resultMsg').textContent = pct>=80
    ? `¡Excelente! Dominas los conceptos del Módulo ${currentMod}. Listo para el siguiente módulo.`
    : pct>=60 ? `Bien, pero repasa los conceptos donde fallaste antes de continuar.`
    : `Necesitas reforzar este módulo. Revisa la guía rápida y vuelve a intentarlo.`;
  rb.scrollIntoView({behavior:'smooth'});
}

function retryModule() {
  document.getElementById('resultBox').className = 'result-box';
  answered = [];
  score = 0;
  document.getElementById('scoreFill').style.width = '0%';
  renderQuestions();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Auto-load based on URL parameter
const urlParams = new URLSearchParams(window.location.search);
const targetMod = urlParams.get('module') || urlParams.get('section');
if (targetMod && MODULES[targetMod]) {
  loadModule(targetMod);
} else {
  loadModule('A1');
}
</script>
</body>
</html>
