<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🃏 Flashcards EPP & Normativa | Vértice EHS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--dark:#080f1a;--navy:#0d1f35;--navy-mid:#24487a;--green:#2E8B57;--green-light:#3aaf6d;--gold:#C9A961;--gold-light:#dfc07a;--red:#e05252;--amber:#e09652;--blue:#5b9bd5;--purple:#9b59b6;--white:#fff;--off-white:#f0f4f8;--muted:#8fa3bc;--border:rgba(255,255,255,.08)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--dark);color:var(--white);font-family:'Barlow',sans-serif}

.header{background:rgba(13,31,53,.9);border-bottom:2px solid var(--gold);padding:18px 40px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-family:'Playfair Display';font-size:24px;color:var(--gold-light)}
.header p{font-size:13px;color:var(--muted);margin-top:2px}
.progress-info{font-family:'Barlow Condensed';font-size:14px;color:var(--muted);letter-spacing:1px}
.progress-info span{color:var(--gold-light);font-size:20px;font-weight:800}

.main{max-width:960px;margin:0 auto;padding:40px 24px}

/* CATEGORY TABS */
.cat-tabs{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap}
.cat-tab{font-family:'Barlow Condensed';font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:8px 18px;border-radius:999px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;transition:all .25s}
.cat-tab:hover{border-color:var(--gold);color:var(--gold-light)}
.cat-tab.active{background:var(--gold-dim, rgba(201,169,97,.12));border-color:var(--gold);color:var(--gold-light)}

/* CARD SCENE */
.card-scene{perspective:1200px;width:100%;max-width:680px;height:380px;margin:0 auto 32px;cursor:pointer;position:relative}
.card-scene:hover .card-inner{box-shadow:0 30px 80px rgba(0,0,0,.4)}
.card-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .7s cubic-bezier(0.4,0,0.2,1);position:relative}
.card-scene.flipped .card-inner{transform:rotateY(180deg)}

.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:48px;overflow:hidden}
.card-front{background:linear-gradient(135deg,var(--navy-mid),var(--navy));border:2px solid var(--border)}
.card-back{background:linear-gradient(135deg,rgba(46,139,87,.15),rgba(13,31,53,.9));border:2px solid rgba(46,139,87,.3);transform:rotateY(180deg)}

.card-front::before{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(201,169,97,.08),transparent 70%);top:-60px;right:-60px;pointer-events:none}
.card-front::after{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(46,139,87,.08),transparent 70%);bottom:-40px;left:-40px;pointer-events:none}

.cat-chip{font-family:'Barlow Condensed';font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:999px;margin-bottom:20px;position:relative;z-index:1}
.chip-epp{background:rgba(91,155,213,.16);color:#7bb8f0;border:1px solid rgba(91,155,213,.3)}
.chip-norma{background:rgba(201,169,97,.14);color:var(--gold-light);border:1px solid rgba(201,169,97,.3)}
.chip-jerarquia{background:rgba(46,139,87,.14);color:var(--green-light);border:1px solid rgba(46,139,87,.3)}
.chip-señal{background:rgba(224,150,82,.14);color:var(--amber);border:1px solid rgba(224,150,82,.3)}
.chip-concepto{background:rgba(155,89,182,.14);color:#d8a8f8;border:1px solid rgba(155,89,182,.3)}

.card-icon{font-size:72px;margin-bottom:20px;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));position:relative;z-index:1}
.card-term{font-family:'Playfair Display';font-size:38px;font-weight:900;color:var(--white);line-height:1.1;margin-bottom:12px;position:relative;z-index:1}
.card-hint{font-size:16px;color:var(--muted);position:relative;z-index:1}

.card-back .def-label{font-family:'Barlow Condensed';font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--green-light);margin-bottom:16px;opacity:.8}
.card-back .def-text{font-size:18px;line-height:1.6;color:var(--off-white);max-width:480px}
.card-back .norm-ref{margin-top:20px;font-family:'Barlow Condensed';font-size:14px;font-weight:800;color:var(--gold-light);letter-spacing:1px;background:rgba(201,169,97,.1);border:1px solid rgba(201,169,97,.25);padding:8px 16px;border-radius:6px}

/* FLIP HINT */
.flip-hint{text-align:center;font-size:14px;color:var(--muted);margin-bottom:28px;display:flex;align-items:center;justify-content:center;gap:8px}
.flip-hint::before,.flip-hint::after{content:'';flex:1;height:1px;background:var(--border);max-width:120px}

/* CONTROLS */
.controls{display:flex;justify-content:center;align-items:center;gap:20px}
.ctrl-btn{font-family:'Barlow Condensed';font-size:16px;font-weight:800;letter-spacing:1px;padding:12px 28px;border-radius:999px;border:1px solid var(--border);cursor:pointer;transition:all .25s;background:rgba(27,54,93,.5);color:var(--muted)}
.ctrl-btn:hover{border-color:var(--gold);color:var(--gold-light);background:rgba(201,169,97,.08)}
.ctrl-btn.primary{background:linear-gradient(90deg,var(--green),var(--gold));color:var(--dark);border-color:transparent;color:#fff}
.ctrl-btn.primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(46,139,87,.3)}
.card-counter{font-family:'Barlow Condensed';font-size:14px;color:var(--muted);min-width:80px;text-align:center}

/* MINI GRID */
.mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:8px;margin-top:40px}
.mini-dot{width:100%;aspect-ratio:1;border-radius:8px;background:rgba(27,54,93,.5);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all .25s;position:relative}
.mini-dot:hover{border-color:var(--gold);transform:scale(1.08)}
.mini-dot.seen{border-color:rgba(46,139,87,.4);background:rgba(46,139,87,.08)}
.mini-dot.current-dot{border-color:var(--gold-light);background:rgba(201,169,97,.12);box-shadow:0 0 0 2px rgba(201,169,97,.3)}

.gold-dim{background:rgba(201,169,97,.12)}
</style>
</head>
<body>
<header class="header">
  <div>
    <h1>🃏 Flashcards EHS</h1>
    <p>Tarjetas de referencia rápida para EPP, Normativa, Jerarquía de Controles y Señalización</p>
  </div>
  <div class="progress-info">Tarjeta <span id="currentNum">1</span> / <span id="totalNum">20</span></div>
</header>

<div class="main">
  <!-- CATEGORÍAS -->
  <div class="cat-tabs">
    <button class="cat-tab active" onclick="filterCat('')">📚 Todas</button>
    <button class="cat-tab" onclick="filterCat('epp')">🦺 EPP</button>
    <button class="cat-tab" onclick="filterCat('norma')">📜 Normativa</button>
    <button class="cat-tab" onclick="filterCat('jerarquia')">🔺 Jerarquía</button>
    <button class="cat-tab" onclick="filterCat('señal')">🚦 Señalización</button>
    <button class="cat-tab" onclick="filterCat('concepto')">💡 Conceptos</button>
  </div>

  <!-- FLIP HINT -->
  <div class="flip-hint">👆 Haz clic en la tarjeta para voltearla</div>

  <!-- CARD -->
  <div class="card-scene" id="cardScene" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front" id="cardFront"></div>
      <div class="card-face card-back" id="cardBack"></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="ctrl-btn" onclick="prevCard()">← Anterior</button>
    <span class="card-counter" id="cardCounter">1 / 20</span>
    <button class="ctrl-btn primary" onclick="nextCard()">Siguiente →</button>
  </div>

  <!-- MINI GRID -->
  <div class="mini-grid" id="miniGrid"></div>
</div>

<script>
const CARDS = [
  // EPP
  {cat:'epp', icon:'🪖', term:'Casco de Seguridad', hint:'Protección craneal certificada',
   def:'Protección para la cabeza contra impactos, penetración y descargas eléctricas. Clase E (eléctrico) resiste 20,000V. Vida útil máxima: 5 años desde fabricación, independientemente del estado visual.',
   norm:'NOM-115-STPS-2009'},
  {cat:'epp', icon:'🦺', term:'Arnés Clase 3', hint:'Sistema de retención de caída libre',
   def:'Equipo de protección para todo el cuerpo que redistribuye las fuerzas de detención de caída en muslos, glúteos, tórax y hombros. Único arnés autorizado para trabajos con riesgo de caída libre. Punto de conexión dorsal (D-ring).',
   norm:'NOM-009-STPS-2011'},
  {cat:'epp', icon:'😷', term:'Respirador N95 / P100', hint:'Eficiencia de filtración de partículas',
   def:'N95: filtra ≥95% de partículas no aceitosas. P100: filtra ≥99.97% incluyendo aerosoles aceitosos. Requiere prueba de ajuste (fit test) anual y sellado hermético al rostro para ser efectivo. No compatible con barba.',
   norm:'NOM-116-STPS-2009 / NIOSH'},
  {cat:'epp', icon:'👟', term:'Calzado de Seguridad', hint:'Cap de acero y suela antideslizante',
   def:'Protege contra aplastamiento (cap de acero 200J), perforación en suela y riesgos eléctricos. Tipos: dieléctrico (EH), antiestático (SD), resistente a químicos. Debe usarse desde el primer día en área de riesgo.',
   norm:'NOM-113-STPS-2009'},
  {cat:'epp', icon:'🥽', term:'Protección Ocular', hint:'ANSI Z87.1 o equivalente',
   def:'Las gafas de seguridad deben tener resistencia al impacto (clasificación Z87.1+). La pantalla facial protege contra salpicaduras de líquidos. Los lentes oscuros no son sustitutos de gafas de seguridad certificadas.',
   norm:'NOM-017-STPS-2024'},
  // NORMATIVA
  {cat:'norma', icon:'📋', term:'NOM-009-STPS-2011', hint:'La norma de trabajos en altura',
   def:'Establece condiciones de seguridad para trabajos en altura (≥1.8m). Requisitos: análisis de riesgo, plan de trabajo seguro, sistemas SPPC, plan de rescate, capacitación documentada. Responsabilidades del patrón y trabajador.',
   norm:'DOF: 06/04/2011'},
  {cat:'norma', icon:'🏢', term:'NOM-030-STPS-2009', hint:'El corazón del sistema SST',
   def:'Servicios preventivos de seguridad y salud en el trabajo. Obliga a elaborar diagnóstico de condiciones SST, programa anual de SST con objetivos y responsables, y reportar a la STPS los avances. Base del sistema de gestión.',
   norm:'DOF: 22/12/2009'},
  {cat:'norma', icon:'👥', term:'NOM-019-STPS-2011', hint:'Las Comisiones de Seguridad e Higiene',
   def:'Regula la constitución y funcionamiento de las Comisiones Mixtas de Seguridad e Higiene (COSH). Deben sesionar ≥1 vez/mes, registrar hallazgos y seguimiento de acuerdos. Integradas por partes iguales patrón/trabajadores.',
   norm:'DOF: 13/04/2011'},
  {cat:'norma', icon:'⚗️', term:'NOM-018-STPS-2015 (SGA)', hint:'Sistema Globalmente Armonizado',
   def:'Sistema Globalmente Armonizado para identificación y comunicación de peligros de sustancias químicas. Exige: etiquetado GHS con 9 pictogramas, indicaciones de peligro (H-phrases), consejos de prudencia (P-phrases), y Hoja de Datos de Seguridad (HDS) de 16 secciones.',
   norm:'DOF: 09/10/2015'},
  {cat:'norma', icon:'🔌', term:'NOM-029-STPS-2011', hint:'Mantenimiento de instalaciones eléctricas',
   def:'Condiciones de seguridad para mantenimiento de instalaciones eléctricas en centros de trabajo. Incluye LOTO eléctrico, clasificación de áreas eléctricas peligrosas (NFPA 70), EPP dieléctrico, y autorizaciones para trabajo eléctrico de alta tensión.',
   norm:'DOF: 29/12/2011'},
  // JERARQUÍA
  {cat:'jerarquia', icon:'🚫', term:'Eliminación del Riesgo', hint:'Nivel 1 — Más efectivo',
   def:'Rediseñar el proceso o tarea para que el peligro no exista. Ejemplos: instalar sensor remoto en lugar de subir a revisarlo, usar diseño intrísecamente seguro. Es el control más efectivo porque elimina la fuente del riesgo.',
   norm:'ISO 45001:2018 / Jerarquía NIOSH'},
  {cat:'jerarquia', icon:'🔄', term:'Sustitución', hint:'Nivel 2 — Reemplazar el peligro',
   def:'Reemplazar un peligro por otro de menor riesgo. Ejemplos: usar plataforma elevadora en lugar de andamio manual, sustituir químico tóxico por uno menos peligroso. Reduce pero no elimina completamente el riesgo.',
   norm:'Jerarquía de Controles NIOSH'},
  {cat:'jerarquia', icon:'🛡️', term:'Controles de Ingeniería', hint:'Nivel 3 — Barreras físicas',
   def:'Modificaciones físicas al proceso o ambiente que reducen la exposición. Ejemplos: guardas de máquinas, ventilación local, barandales certificados, líneas de vida fijas, aislamientos de ruido. No dependen del comportamiento del trabajador.',
   norm:'NOM-009, NOM-029, ISO 45001'},
  {cat:'jerarquia', icon:'📋', term:'Controles Administrativos', hint:'Nivel 4 — Procedimientos y supervisión',
   def:'Cambios en cómo se realiza el trabajo: PTS, permisos de trabajo, señalización, rotación de turnos, capacitación, reglas de seguridad. Son menos efectivos porque dependen del cumplimiento humano y requieren supervisión constante.',
   norm:'NOM-030, NOM-009'},
  {cat:'jerarquia', icon:'🦺', term:'EPP — Última Barrera', hint:'Nivel 5 — Menos efectivo',
   def:'El EPP es la ÚLTIMA línea de defensa, no la primera. Solo protege al trabajador cuando el peligro ya existe. No elimina el peligro, solo reduce la severidad de una exposición. Siempre se usa cuando los controles superiores no son suficientes.',
   norm:'NOM-017-STPS-2024'},
  // SEÑALIZACIÓN
  {cat:'señal', icon:'🔴', term:'Color Rojo — Prohibición/Contra Incendio',
   hint:'NOM-026 — Señal de alto riesgo',
   def:'Color rojo: señales de PROHIBICIÓN (no hacer) y equipos de CONTRA INCENDIO (extintores, hidrantes). Fondo blanco, símbolo negro. Ejemplos: No fumar, No entrar, Extintor, Hidrante de incendio.',
   norm:'NOM-026-STPS-2008'},
  {cat:'señal', icon:'🟡', term:'Color Amarillo — Advertencia',
   hint:'NOM-026 — Señal de precaución',
   def:'Color amarillo/ámbar: señales de ADVERTENCIA o PRECAUCIÓN sobre riesgos o peligros. Triángulo negro sobre fondo amarillo. Ejemplos: Piso resbaloso, Peligro eléctrico, Materiales corrosivos. Requiere acción de precaución del trabajador.',
   norm:'NOM-026-STPS-2008'},
  {cat:'señal', icon:'🟢', term:'Color Verde — Condición Segura',
   hint:'NOM-026 — Información de emergencia',
   def:'Color verde: información de CONDICIÓN SEGURA y equipos de emergencia. Ejemplos: Salida de emergencia, Ruta de evacuación, Punto de reunión, Botiquín de primeros auxilios, Ducha de emergencia.',
   norm:'NOM-026-STPS-2008'},
  // CONCEPTOS
  {cat:'concepto', icon:'⚠️', term:'Peligro vs. Riesgo', hint:'La distinción fundamental en SST',
   def:'PELIGRO: fuente o situación con potencial de daño. RIESGO: combinación de probabilidad y consecuencia de que el peligro se materialice. Ejemplo: El cable eléctrico expuesto es el PELIGRO. El RIESGO es la probabilidad de electrocución multiplicada por la severidad del daño.',
   norm:'ISO 45001:2018 / OHSAS 18001'},
  {cat:'concepto', icon:'🔍', term:'Near Miss (Casi Accidente)', hint:'La oportunidad de oro de la prevención',
   def:'Evento no deseado que no resultó en lesión, daño o pérdida, pero que TENÍA EL POTENCIAL de hacerlo. Son señales tempranas de que algo en el sistema está fallando. Reportar near misses es obligación moral y herramienta preventiva fundamental.',
   norm:'Pirámide de Bird / ISO 45001'},
];

let currentCat = '';
let filteredCards = [...CARDS];
let currentIdx = 0;
let seen = new Set();

function filterCat(cat) {
  currentCat = cat;
  filteredCards = cat ? CARDS.filter(c=>c.cat===cat) : [...CARDS];
  currentIdx = 0;
  seen.clear();
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  renderCard();
  buildMiniGrid();
}

function renderCard() {
  if (!filteredCards.length) return;
  const card = filteredCards[currentIdx];
  seen.add(currentIdx);
  document.getElementById('cardScene').classList.remove('flipped');

  const chipClass = `chip-${card.cat}`;
  const catLabel = {epp:'🦺 EPP',norma:'📜 Normativa',jerarquia:'🔺 Jerarquía',señal:'🚦 Señalización',concepto:'💡 Concepto'}[card.cat];

  document.getElementById('cardFront').innerHTML = `
    <div class="cat-chip ${chipClass}">${catLabel}</div>
    <span class="card-icon">${card.icon}</span>
    <div class="card-term">${card.term}</div>
    <div class="card-hint">${card.hint}</div>`;

  document.getElementById('cardBack').innerHTML = `
    <div class="def-label">✅ Definición</div>
    <div class="def-text">${card.def}</div>
    ${card.norm ? `<div class="norm-ref">📋 ${card.norm}</div>` : ''}`;

  document.getElementById('cardCounter').textContent = `${currentIdx+1} / ${filteredCards.length}`;
  document.getElementById('currentNum').textContent = currentIdx+1;
  document.getElementById('totalNum').textContent = filteredCards.length;
  updateMiniGrid();
}

function flipCard() {
  document.getElementById('cardScene').classList.toggle('flipped');
}

function nextCard() {
  if (currentIdx < filteredCards.length-1) { currentIdx++; renderCard(); }
  else { currentIdx=0; renderCard(); } // loop
}

function prevCard() {
  if (currentIdx > 0) { currentIdx--; renderCard(); }
}

function buildMiniGrid() {
  const grid = document.getElementById('miniGrid');
  grid.innerHTML = '';
  filteredCards.forEach((card, i) => {
    const dot = document.createElement('div');
    dot.className = `mini-dot ${i===currentIdx?'current-dot':''}`;
    dot.id = `dot-${i}`;
    dot.innerHTML = card.icon;
    dot.title = card.term;
    dot.onclick = () => { currentIdx=i; renderCard(); };
    grid.appendChild(dot);
  });
}

function updateMiniGrid() {
  filteredCards.forEach((_, i) => {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) return;
    dot.className = `mini-dot ${seen.has(i)?'seen':''} ${i===currentIdx?'current-dot':''}`;
  });
}

// KEYBOARD SUPPORT
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); nextCard(); }
  if (e.key==='ArrowLeft') { e.preventDefault(); prevCard(); }
  if (e.key==='Enter'||e.key==='f') flipCard();
});

// INIT
renderCard();
buildMiniGrid();
</script>
</body>
</html>
